<div class="page-header">
  <h1>Departments</h1>
</div>
<mat-card>
  <table mat-table [dataSource]="departments()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let dept">{{ dept.name }}</td>
    </ng-container>
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let dept">{{ dept.description }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status / Employees</th>
      <td mat-cell *matCellDef="let dept">
        <mat-chip [class]="dept.isActive ? 'active' : 'inactive'">
          {{ dept.isActive ? 'Active' : 'Inactive' }}
        </mat-chip>
        <span style="margin-left: 8px; font-size: 13px; color: #666;">{{ getEmployeeCount(dept.id) }} active</span>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let dept">
        @if (dept.isActive) {
          <button mat-icon-button color="warn" (click)="deactivate(dept.id)">
            <mat-icon>block</mat-icon>
          </button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
